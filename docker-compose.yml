services:
  wan-move-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${WAN_MOVE_IMAGE:-wan-move-api:latest}
    ports:
      - "${WAN_MOVE_PORT:-8000}:8000"
    environment:
      WAN_MOVE_CKPT_DIR: /models/Wan-Move-14B-480P
      WAN_MOVE_OUTPUT_DIR: /outputs
      WAN_MOVE_PORT: "8000"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
    volumes:
      - type: bind
        source: ${WAN_MOVE_WEIGHTS_DIR:-./Wan-Move-14B-480P}
        target: /models/Wan-Move-14B-480P
        read_only: true
      - type: bind
        source: ${WAN_MOVE_OUTPUTS_DIR:-./outputs}
        target: /outputs
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]
